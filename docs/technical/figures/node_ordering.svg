<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" font-family="sans-serif">
  <!-- Straight Line -->
  <line x1="100" y1="100" x2="630" y2="100" stroke="#ccc" stroke-width="12" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="100" cy="100" r="8" fill="#e74c3c"/> <!-- dn_node -->
  <circle cx="190" cy="100" r="6" fill="#95a5a6"/>
  <circle cx="280" cy="100" r="6" fill="#95a5a6"/>
  <circle cx="370" cy="100" r="6" fill="#95a5a6"/>
  <circle cx="460" cy="100" r="6" fill="#95a5a6"/>
  <circle cx="540" cy="100" r="6" fill="#95a5a6"/>
  <circle cx="630" cy="100" r="8" fill="#27ae60"/> <!-- up_node -->

  <!-- Labels: node_order -->
  <text x="100" y="75" text-anchor="middle" font-size="12" font-weight="bold">1</text>
  <text x="190" y="75" text-anchor="middle" font-size="12">2</text>
  <text x="280" y="75" text-anchor="middle" font-size="12">3</text>
  <text x="370" y="75" text-anchor="middle" font-size="12">4</text>
  <text x="460" y="75" text-anchor="middle" font-size="12">5</text>
  <text x="540" y="75" text-anchor="middle" font-size="12">6</text>
  <text x="630" y="75" text-anchor="middle" font-size="12" font-weight="bold">n</text>

  <text x="365" y="55" text-anchor="middle" font-size="11" fill="#666" font-style="italic">node_order</text>

  <!-- Node IDs -->
  <text x="100" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">dn_node_id</text>
  <text x="100" y="145" text-anchor="middle" font-size="9" fill="#999">lowest dist_out</text>

  <text x="630" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">up_node_id</text>
  <text x="630" y="145" text-anchor="middle" font-size="9" fill="#999">highest dist_out</text>

  <!-- Legend / Flow -->
  <text x="365" y="165" text-anchor="middle" font-size="10" fill="#666">dist_out increases upstream (opposite flow)</text>
  <text x="50" y="105" text-anchor="end" font-size="11" fill="#999" font-style="italic">flow &#8594;</text>
</svg>