<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="sans-serif">
  <!-- Paths -->
  <path d="M 50 100 H 150 L 300 50 L 450 100 H 550" fill="none" stroke="#666" stroke-width="2"/>
  <path d="M 150 100 L 300 150 L 450 100" fill="none" stroke="#666" stroke-width="2"/>

  <!-- Nodes -->
  <circle cx="150" cy="100" r="6" fill="#8e44ad"/> <!-- D -->
  <circle cx="450" cy="100" r="6" fill="#2c3e50"/> <!-- G -->
  <circle cx="300" cy="50" r="4" fill="#3498db"/>  <!-- E1 -->
  <circle cx="300" cy="150" r="4" fill="#e67e22"/> <!-- F1 -->

  <!-- Distance Labels -->
  <text x="150" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#8e44ad">D: 55 km</text>
  <text x="450" y="85" text-anchor="middle" font-size="12" fill="#2c3e50">G: 10 km</text>
  <text x="300" y="40" text-anchor="middle" font-size="12" fill="#3498db">52 km (Long branch)</text>
  <text x="300" y="170" text-anchor="middle" font-size="12" fill="#e67e22">27 km (Short branch)</text>

  <!-- Gap Annotations -->
  <text x="210" y="70" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">3 km gap</text>
  <text x="210" y="140" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">28 km gap!</text>

  <!-- Flow -->
  <text x="550" y="20" text-anchor="end" font-size="11" fill="#999" font-style="italic">flow &#8594;</text>
</svg>